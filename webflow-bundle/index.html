<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draftaid UI web components — demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 2.5rem;
        background: #f3f3f5;
        color: #111;
      }
      h1 { font-size: 1.1rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin: 1rem 0 2rem; }
      .dark-panel { background: #14121c; color: #fff; padding: 1.5rem; border-radius: 12px; }
    </style>
  </head>
  <body>
    <h1>&lt;draftaid-button&gt; — light</h1>
    <div class="row">
      <draftaid-button text="Default" variant="default"></draftaid-button>
      <draftaid-button text="Secondary" variant="secondary"></draftaid-button>
      <draftaid-button text="Outline" variant="outline"></draftaid-button>
      <draftaid-button text="Ghost" variant="ghost"></draftaid-button>
      <draftaid-button text="Glow" variant="glow"></draftaid-button>
      <draftaid-button text="Link" variant="link"></draftaid-button>
      <draftaid-button text="Destructive" variant="destructive"></draftaid-button>
    </div>

    <div class="row">
      <draftaid-button text="Small" variant="default" size="sm"></draftaid-button>
      <draftaid-button text="Large" variant="default" size="lg"></draftaid-button>
      <draftaid-button text="Get Started" variant="default" href="/signup"></draftaid-button>
      <draftaid-button text="Disabled" variant="default" disabled></draftaid-button>
    </div>

    <h1>icons (Phosphor)</h1>
    <div class="row">
      <draftaid-button text="Continue" variant="default" icon="arrow-right" icon-position="end"></draftaid-button>
      <draftaid-button text="Download" variant="outline" icon="download"></draftaid-button>
      <draftaid-button text="Schedule a Demo" variant="secondary" icon="calendar"></draftaid-button>
      <draftaid-button text="Star" variant="default" icon="star" icon-weight="fill"></draftaid-button>
      <draftaid-button text="Add" variant="default" size="icon" icon="plus"></draftaid-button>
    </div>

    <div class="dark-panel">
      <h1>&lt;draftaid-button&gt; — theme="dark"</h1>
      <div class="row">
        <draftaid-button text="Default" variant="default" theme="dark"></draftaid-button>
        <draftaid-button text="Secondary" variant="secondary" theme="dark"></draftaid-button>
        <draftaid-button text="Outline" variant="outline" theme="dark"></draftaid-button>
        <draftaid-button text="Glow" variant="glow" theme="dark"></draftaid-button>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
